# NSU Audit — Docker Compose (development)
# Optimised for Apple Silicon (ARM64) — all images have official ARM64 variants.
#
# Usage:
#   docker compose up --build          # start all services
#   docker compose run --rm api alembic upgrade head   # run DB migrations
#   docker compose down -v             # stop + remove volumes

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nsu_audit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-nsu_audit_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nsu_audit} -d ${POSTGRES_DB:-nsu_audit_db}"]
      interval: 5s
      retries: 10
    ports:
      - "5432:5432" # expose locally for pgAdmin / DBeaver during development

  # ── FastAPI + audit engine ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Override DATABASE_URL with the Docker service hostname
      DATABASE_URL: >-
        postgresql://${POSTGRES_USER:-nsu_audit}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-nsu_audit_db}
      APP_ENV: development
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      # Hot-reload: mount source for development (comment out for production)
      - .:/app
    command: >
      uvicorn backend.main:app
        --host 0.0.0.0
        --port 8000
        --reload

  # ── React / Nginx frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80" # dev port — matches CORS_ALLOWED_ORIGINS in .env
    depends_on:
      - api

volumes:
  pg_data:
