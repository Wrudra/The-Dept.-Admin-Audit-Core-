# NSU Audit — Docker Compose (production-like defaults)
#
# Usage:
#   docker compose up --build                 # production-like stack
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#                                           # development stack with hot reload
#   docker compose down -v                    # stop + remove volumes

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nsu_audit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-nsu_audit_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-nsu_audit} -d ${POSTGRES_DB:-nsu_audit_db}",
        ]
      interval: 5s
      retries: 10
    ports:
      - "5432:5432" # expose locally for pgAdmin / DBeaver during development

  # ── FastAPI + audit engine ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Override DATABASE_URL with Docker service hostname.
      DATABASE_URL: >-
        postgresql://${POSTGRES_USER:-nsu_audit}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-nsu_audit_db}
      APP_ENV: ${APP_ENV:-production}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,db,api,frontend}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    command: >
      sh -c "alembic upgrade head &&
      exec uvicorn backend.main:app --host 0.0.0.0 --port 8000"

  # ── React / Nginx frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pg_data:
