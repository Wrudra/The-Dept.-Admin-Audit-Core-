server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy /api/* → FastAPI container ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Preserve the original protocol — ngrok terminates TLS and forwards
        # X-Forwarded-Proto: https; fall back to $scheme for direct local access.
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto$scheme;
        # Large uploads (transcript PDF/CSV)
        client_max_body_size 12m;
        proxy_read_timeout   120s;
    }

    # ── Proxy /mcp/* → FastAPI MCP server (SSE) ──────────────────────────────
    # SSE connections are long-lived — disable buffering and extend timeouts.
    location /mcp/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto$scheme;
        # SSE requires unbuffered streaming
        proxy_buffering    off;
        proxy_cache        off;
        # Hold SSE connections open for up to 1 hour
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 12m;
    }

    # ── SPA fallback — serve index.html for all non-asset routes ─────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header X-Frame-Options         "DENY"         always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
}
